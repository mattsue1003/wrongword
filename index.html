            box-sizing: border-box;

            left: -10px;

            position: relative;
            display: inline-block;
            padding: 0 2px;

        .is-wrong-ans {
            color: #dc2626;

            content: '';
            position: absolute;
            top: 50%;
            left: 45%;
            width: 1.2em;
            height: 1.2em;
            border: 3px solid #dc2626;
            border-radius: 50%;
            transform: translate(-50%, -50%);

</head>

<div class="top-banner no-print"></div>

<div class="controls no-print">
    <h2>🎯 台灣常用詞彙找錯字挑戰 (三字版)</h2>
    <div class="designer-info">
        <b>測驗說明：</b>每張考卷將從資料庫中隨機挑選 27 個台灣常見的三字詞彙，每個詞彙中都包含<b>「一個」</b>錯別字。前 2 題為示範題，剩下 25 題請受測者仔細觀察並圈出錯字。<br>
        <b>適用對象：</b>樂齡長者認知訓練、大腦體操、國小學童國字練習。<br>
        <b>目前題庫量：</b>已擴充至 200 題。
    </div>

    <div class="control-grid">
        <div class="control-group">
            <label>📝 測驗卷標題</label>

        </div>
        <div class="control-group">
            <label>📄 產生頁數</label>
            <input type="number" id="pageCount" value="1" min="1" max="20">
        </div>
        <div class="control-group">
            <label>👁️ 答案顯示</label>
            <select id="showAns">
                <option value="yes" selected>產生解答頁 (紅圈標示)</option>
                <option value="no">不產生解答</option>
            </select>
        </div>
    </div>

    <div class="btn-group">
        <button class="gen-btn" onclick="generateSheets()">✨ 產生測驗卷</button>
        <button class="print-btn" onclick="window.print()">🖨️ 直接列印</button>
        <button class="pdf-btn" id="pdfBtn" onclick="downloadPDF()">📱 下載 PDF</button>

</div>

<div class="preview-area" id="output"></div>
<div id="hidden-capture"></div>

        { w: "花補裡", c: "花圃裡", i: 1 }, { w: "荷花持", c: "荷花池", i: 2 }, { w: "噴水持", c: "噴水池", i: 2 },
        { w: "涼停裡", c: "涼亭裡", i: 1 }, { w: "長椅上", c: "長椅上", i: 2 }, // 改長倚上
        { w: "長倚上", c: "長椅上", i: 1 }, { w: "野餐電", c: "野餐墊", i: 2 }, { w: "露營帳", c: "露營帳", i: 2 }, // 改露營漲
        { w: "露營漲", c: "露營帳", i: 2 }, { w: "烤肉架", c: "烤肉架", i: 2 }, // 改烤肉駕

        { w: "尺歸組", c: "尺規組", i: 1 }, { w: "圓歸尺", c: "圓規尺", i: 1 }, { w: "量角汽", c: "量角器", i: 2 },

        { w: "膠水平", c: "膠水瓶", i: 2 }, { w: "膠袋捲", c: "膠帶捲", i: 1 }, { w: "釘書機", c: "釘書機", i: 2 }, // 改丁書機
        { w: "丁書機", c: "釘書機", i: 0 }, { w: "迴紋真", c: "迴紋針", i: 2 }, { w: "塗改夜", c: "塗改液", i: 2 }
    ];

    const ITEMS_PER_PAGE = 27; // 3列 x 9行

    function getRandomVocabs(num) {
        let shuffled = [...VOCAB_DB].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, num);
    }

    function renderVocabGrid(vocabs, isAns) {
        return vocabs.map((item, itemIndex) => {
            const isExample = (itemIndex < 2 && !isAns); // 判斷是否為作答卷上的前兩題

            const chars = item.w.split('');
            const charHTML = chars.map((char, index) => {
                const isWrong = (index === item.i);
                
                if (isAns && isWrong) {
                    // 解答頁：顯示正確字 + 紅圈 + 綠色標示原錯字
                    const correctChar = item.c[index];
                    return `<span class="char-span is-wrong-ans">${correctChar}<div class="correct-text">原錯字「${char}」</div></span>`;
                } else if (isExample && isWrong) {
                    // 示範題：維持原錯字 (字體黑色) + 僅紅圈
                    return `<span class="char-span is-wrong-ans" style="color: #1e293b;">${char}</span>`;
                } else {
                    return `<span class="char-span">${char}</span>`;
                }
            }).join('');
            
            const badgeHTML = isExample ? `<div class="example-badge">示範</div>` : '';
            return `<div class="vocab-item">${badgeHTML}${charHTML}</div>`;
        }).join('');
    }

    function generateSheets() {
        const title = document.getElementById('titleInput').value;
        const pages = Math.max(1, parseInt(document.getElementById('pageCount').value) || 1);
        const showAns = document.getElementById('showAns').value;
        const output = document.getElementById('output');
        
        output.innerHTML = '<div style="padding: 20px; font-weight: bold; color: #0ea5e9;">考卷產生中，請稍候...</div>';

        setTimeout(() => {
            output.innerHTML = '';
            let allData = [];

            for (let p = 1; p <= pages; p++) {
                const vocabs = getRandomVocabs(ITEMS_PER_PAGE);
                allData.push({ vocabs, pageNum: p });
                output.appendChild(renderPage(title, vocabs, p, false));
            }

            if (showAns === 'yes') {
                allData.forEach(data => {
                    output.appendChild(renderPage(title + " (解答卷)", data.vocabs, data.pageNum, true));
                });
            }
            updateScale();
        }, 50);
    }

    function renderPage(title, vocabs, pageNum, isAns) {
        const scaler = document.createElement('div');
        scaler.className = 'sheet-scaler';
        const sheet = document.createElement('div');
        sheet.className = 'sheet';

        sheet.innerHTML = `
            <div class="sheet-header">
                <div class="sheet-title">${title}</div>
                <div class="sheet-author">
                    <a href="https://www.facebook.com/profile.php?id=100063748491881" target="_blank">設計者：鍾孟修職能治療師</a>
                </div>
                <div class="sheet-info">
                    <span>姓名：_________________</span>
                    <span>日期：_____月_____日</span>
                    <span>答對：________ / 25 題</span>
                </div>
            </div>
            <div class="instruction">
                <div class="instruction-main">💡 任務說明：請仔細閱讀下方詞彙，圈出每個詞彙中【唯一】的錯別字。</div>
                <div class="instruction-sub">（前 2 題為示範，共 25 題作答）</div>
            </div>
            
            <div class="vocab-grid">
                ${renderVocabGrid(vocabs, isAns)}
            </div>

            <div class="sheet-footer">
                <span>${isAns ? '解答卷' : '測驗卷'} - 第 ${pageNum} 頁</span>
                <span>設計者：鍾孟修職能治療師</span>
            </div>
        `;
        scaler.appendChild(sheet);
        return scaler;
    }

    function updateScale() {
        const containerWidth = document.querySelector('.preview-area').clientWidth - 40;
        const scalers = document.querySelectorAll('.sheet-scaler');
        if (scalers.length === 0) return;
        const sheetWidth = 210 * 3.7795;
        let scale = containerWidth / sheetWidth;
        if (scale > 1) scale = 1;
        scalers.forEach(s => {
            s.style.transform = `scale(${scale})`;
            s.style.height = (297 * 3.7795 * scale) + "px";
        });
    }

    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const btn = document.getElementById('pdfBtn');
        const sheets = document.querySelectorAll('.sheet');
        const hidden = document.getElementById('hidden-capture');
        
        if (sheets.length === 0) return alert("請先產生測驗卷");
        
        btn.disabled = true;
        btn.innerText = "⏳ 正在轉換 PDF...";

        try {
            const pdf = new jsPDF('p', 'mm', 'a4');
            for (let i = 0; i < sheets.length; i++) {
                btn.innerText = `⏳ 正在轉換第 ${i+1}/${sheets.length} 頁...`;
                const clone = sheets[i].cloneNode(true);
                clone.style.transform = "none";
                hidden.appendChild(clone);
                const canvas = await html2canvas(clone, { scale: 1.5 }); 
                hidden.removeChild(clone);
                const imgData = canvas.toDataURL('image/jpeg', 0.85);
                if (i > 0) pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
            }
            pdf.save('找錯字紙本挑戰.pdf');
        } catch (e) {
            console.error(e);
            alert("轉換 PDF 時發生錯誤。建議頁數過多時分次產生，或直接點選列印。");
        } finally {
            btn.disabled = false;
            btn.innerText = "📱 下載 PDF";
        }
    }

    window.addEventListener('resize', updateScale);
    window.onload = generateSheets;
</script>
